post:
  tags:
    - Energy Profiles v1
  summary: Retrieve a block of energy profiles.
  description: >-
    Get the energy profiles for a collection of assets over a date range.
    If an asset has a profile it will be returned, otherwise a downstream trace
    will be performed and the aggregation of the profiles found will be returned.


    If a toAsset is provided, a downstream path must exist between fromAsset and
    the toAsset otherwise an error will be returned.


    If aggregateParam is enabled, you will receive a single aggregated profile back
    for all located profiles, and an error profile for each problem encountered.  operationId: dateRangeFromMulti
  parameters:
    - $ref: 'v1-parameters.yaml#/systemTagParam'
    - $ref: 'v1-parameters.yaml#/filterParam'
    - $ref: 'v1-parameters.yaml#/includeReadingsParam'
    - $ref: 'v1-parameters.yaml#/fromDateRequiredParam'
    - $ref: 'v1-parameters.yaml#/toDateRequiredParam'
    - $ref: 'v1-parameters.yaml#/aggregateParam'
  responses:
    '200':
      $ref: 'v1-response-energy-profile-multi.yaml'
    '400':
      $ref: '../../v1-response-bad-request.yaml'
    '404':
      $ref: '../../v1-response-not-found.yaml'
